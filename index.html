<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earner Community Hub</title>
    <style>
        :root {
            --bg-color: #121417;
            --lamp-shade: #f5f0e6;
            --lamp-base: #d1ccc2;
            --glow-color: rgba(255, 214, 110, 0.3);
            --on: 0;
            --transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-color); color: white; overflow-x: hidden; transition: background var(--transition); }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 40%, var(--glow-color), transparent 70%);
            opacity: var(--on); transition: opacity var(--transition); pointer-events: none; z-index: 0;
        }

        /* ALERTS */
        #alert { display: none; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #28a745; color: white; padding: 10px 25px; border-radius: 30px; z-index: 10001; font-weight: bold; }
        
        #disclaimer-box {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 350px; background: #e0f7fa; border: 2px solid #00bcd4;
            border-radius: 15px; padding: 20px; z-index: 10002; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center; color: #006064; font-weight: bold; line-height: 1.5;
        }
        .highlight { color: #d32f2f; background: #ffeb3b; padding: 2px 4px; border-radius: 4px; }

        /* LAMP SECTION (PULL ANIMATION) */
        .lamp-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; z-index: 100; position: fixed; width: 100%; top: 0; transition: opacity 0.5s, visibility 0.5s; }
        body[data-on="true"] .lamp-container { opacity: 0; visibility: hidden; }
        .lamp-wrapper { position: relative; width: 180px; height: 300px; }
        .lamp-shade { fill: var(--lamp-shade); transition: var(--transition); }
        .cord-hit { cursor: ns-resize; }
        
        /* CONTENT */
        #main-wrapper { display: none; opacity: 0; transition: opacity 1s; position: relative; z-index: 10; padding-bottom: 30px; }
        body[data-on="true"] #main-wrapper { display: block; opacity: 1; }

        .header-box { margin: 15px; height: 110px; background: linear-gradient(135deg, #6e8efb, #a777e3); border-radius: 12px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .top-nav { display: flex; position: sticky; top: 0; background: rgba(18, 20, 23, 0.95); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #333; }
        .nav-item { flex: 1; padding: 15px; text-align: center; color: #777; font-weight: bold; cursor: pointer; }
        .nav-item.active { color: #a777e3; border-bottom: 3px solid #a777e3; }

        .content-box { padding: 20px; display: none; max-width: 600px; margin: 0 auto; }
        .active-tab { display: block; }

        /* GRID */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .link-card { border: 2px solid #007bff; border-radius: 12px; padding: 15px 5px; text-align: center; background: rgba(255,255,255,0.05); font-weight: bold; cursor: pointer; }

        /* OWNER */
        .flip-card { width: 100%; height: 420px; perspective: 1000px; cursor: pointer; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.is-flipped .flip-card-inner { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 25px; padding: 25px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .card-front { background: linear-gradient(180deg, #3d33ff 0%, #a233ff 100%); }
        .card-back { transform: rotateY(180deg); background: #fdfaff; color: #333; border: 2px solid #8e44ad; }
        .profile-img { width: 110px; border-radius: 50%; border: 4px solid #ffcc00; margin-bottom: 15px; }
        .earning-box { background: #111; padding: 20px; border-radius: 20px; width: 100%; border: 2px solid #ffcc00; text-align: center; }
        #count { font-size: 40px; font-weight: 900; color: #ffcc00; }
    </style>
</head>
<body data-on="false">

    <div id="alert">✅ Link Copied!</div>
    <div id="disclaimer-box" onclick="this.style.display='none'">
        Es video mai dey gay kis bhi <span class="highlight">Referral Code</span> ko na daly nhi to <span class="highlight">PAYOUT</span> nhi mily ga.
    </div>

    <div class="lamp-container">
        <div class="lamp-wrapper">
            <svg class="lamp-svg" viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
                <rect x="92" y="100" width="16" height="160" rx="8" fill="var(--lamp-base)" />
                <rect x="60" y="250" width="80" height="12" rx="6" fill="var(--lamp-base)" />
                <g class="pull-cord">
                    <line id="cord" x1="130" y1="110" x2="130" y2="190" style="stroke:#777; stroke-width:3" />
                    <circle id="bead" cx="130" cy="195" r="9" fill="#d4a373" />
                    <circle id="hit-area" cx="130" cy="195" r="30" fill="transparent" class="cord-hit" />
                </g>
                <path class="lamp-shade" d="M30 110 C 30 50, 170 50, 170 110 C 170 125, 30 125, 30 110 Z" fill="var(--lamp-shade)" />
            </svg>
            <p style="text-align:center; color:#777; margin-top:10px; font-weight:bold; font-size:12px;">PULL DOWN TO ENTER</p>
        </div>
    </div>

    <div id="main-wrapper">
        <div class="header-box">
            <h1>Earner Community</h1>
            <p>TEAM WARRIOR [ᴛᴡ]</p>
        </div>
        <div class="top-nav">
            <div class="nav-item active" onclick="switchTab('process', this)">Process</div>
            <div class="nav-item" onclick="switchTab('owner', this)">Owner</div>
            <div class="nav-item" onclick="switchTab('trade', this)">Trade</div>
        </div>
        <div id="process" class="content-box active-tab"><div class="main-grid" id="process-grid"></div></div>
        <div id="owner" class="content-box">
            <div class="flip-card" onclick="handleFlip(this)">
                <div class="flip-card-inner">
                    <div class="card-face card-front">
                        <img src="https://i.ibb.co/x8fkt55V/photo.jpg" class="profile-img">
                        <h2 style="color:white;">𝗞𝗥𝗜𝗦𝗛𝗡𝗔 𝗬𝗔𝗗𝗔𝗩</h2>
                        <p style="color:#ffcc00;">Founder of Team Warrior</p>
                        <p style="margin-top:15px; font-size:11px; opacity:0.7">Tap to Reveal Earning ↻</p>
                    </div>
                    <div class="card-face card-back">
                        <div class="earning-box">
                            <p style="color:white; font-size:14px; font-weight:bold;">TOTAL EARNING</p>
                            <div id="count">₹0</div>
                        </div>
                        <a href="https://wa.link/bwdttd" style="background:#25d366; color:white; padding:12px 30px; border-radius:30px; text-decoration:none; font-weight:bold; margin-top:20px; display:inline-block;">WhatsApp</a>
                    </div>
                </div>
            </div>
        </div>
        <div id="trade" class="content-box"><div class="main-grid" id="trade-grid"></div></div>
    </div>

    <script src="https://unpkg.co/gsap@3/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap@3/dist/Draggable.min.js"></script>

    <script>
        gsap.registerPlugin(Draggable);

        const appsData = [
            { name: "𝐀𝐍𝐆𝐄𝐋 𝐎𝐍𝐄", p: "https://tinyurl.com/earnercommunity-angelone", t: "https://tinyurl.com/earnercommunity-angel-trade", special: false },
            { name: "𝐀𝐗𝐈𝐒 𝐌𝐅", p: "https://tinyurl.com/earnercommunity-axismf1", t: "https://tinyurl.com/earnercommunity-axismf", special: false },
            { name: "𝐓𝐈𝐃𝐄", p: "https://tinyurl.com/EarnerCommunity-tide", t: "https://tinyurl.com/EarnerCommunity-tide", special: false },
            { name: "𝐀𝐃𝐈𝐓𝐘𝐀 𝐁𝐈𝐑𝐋𝐀", p: "https://youtu.be/fl_o8a8pcGM", t: "https://drive.google.com/file/d/1UArx_WhdtDJNz0O-GO7Q6ppI4FIfh1zU/view?usp=drivesdk", special: false },
            { name: "𝐔𝐏𝐒𝐓𝐎𝐂Ｋ", p: "https://tinyurl.com/earnercommunity-upstox", t: "https://youtu.be/ddEQGxsEnlQ", special: false },
            { name: "𝐌𝐒𝐓𝐎𝐂𝐊", p: "https://tinyurl.com/earnercommunity-mstock", t: "https://youtube.com/shorts/hJ7XMtPmqMc", special: false },
            { name: "𝐄𝐐𝐔𝐈𝐓𝐘 𝐁ΑΝΚ", p: "https://earnercommunitylinks.blogspot.com/p/equitas_5.html", t: "NO", special: false },
            { name: "𝐈𝐍𝐃𝐈𝐀 𝐁𝐔𝐋𝐋𝐒", p: "https://youtu.be/zD13mX65pAs", t: "https://tinyurl.com/Earnercommunity-ibulls", special: true },
            { name: "𝐊𝐎𝐓𝐀𝐊", p: "https://youtu.be/6S8H6i-Y-pE", t: "https://tinyurl.com/earnercommunity-kotak", special: true },
            { name: "𝟓 𝐏𝐀𝐈𝐒𝐀", p: "https://youtu.be/M_w5yN_kP3o", t: "https://youtube.com/shorts/3fKDmt-LQaU", special: true },
            { name: "𝐀𝐈𝐑𝐓𝐄𝐋 𝐁ΑΝΚ", p: "https://youtu.be/vOQAnvA5O0k", t: "NO", special: true },
            { name: "𝐇𝐒𝐁𝐂𝐌𝐅", p: "https://youtu.be/t2yI_C9h4eE", t: "NO", special: true }
        ];

        // PULL ANIMATION LOGIC
        const cord = document.getElementById('cord');
        const bead = document.getElementById('bead');
        const hitArea = document.getElementById('hit-area');

        Draggable.create(hitArea, {
            type: "y",
            bounds: { minY: 0, maxY: 60 },
            onDrag: function() {
                gsap.set(bead, { y: this.y });
                cord.setAttribute('y2', 190 + this.y);
            },
            onRelease: function() {
                if (this.y > 35) {
                    document.body.setAttribute('data-on', 'true');
                    document.documentElement.style.setProperty('--on', '1');
                }
                gsap.to([bead, hitArea], { y: 0, duration: 0.5, ease: "back.out(2.5)" });
                gsap.to(cord, { attr: { y2: 190 }, duration: 0.5, ease: "back.out(2.5)" });
            }
        });

        function handleFlip(card) {
            card.classList.toggle('is-flipped');
            if (card.classList.contains('is-flipped')) { revealEarning(); }
        }

        function revealEarning() {
            const startDate = new Date('2026-03-01');
            const diffDays = Math.floor((new Date() - startDate) / (1000*60*60*24));
            const target = 2500 + (diffDays * 130);
            let current = 0;
            let timer = setInterval(() => {
                current += Math.ceil(target / 40);
                if(current >= target) { current = target; clearInterval(timer); }
                document.getElementById("count").innerText = "₹" + current.toLocaleString();
            }, 30);
        }

        function switchTab(id, el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.content-box').forEach(c => c.classList.remove('active-tab'));
            el.classList.add('active');
            document.getElementById(id).classList.add('active-tab');
        }

        function copyLink(url, isSpecial, tab) {
            if(url === "NO") return;
            navigator.clipboard.writeText(url);
            document.getElementById('alert').style.display = 'block';
            setTimeout(() => { document.getElementById('alert').style.display = 'none'; }, 2000);
            if(isSpecial && tab === 'process') {
                document.getElementById('disclaimer-box').style.display = 'block';
                setTimeout(() => { document.getElementById('disclaimer-box').style.display = 'none'; }, 6000);
            }
        }

        window.onload = () => {
            const pGrid = document.getElementById('process-grid');
            const tGrid = document.getElementById('trade-grid');
            appsData.forEach(app => {
                const pDiv = document.createElement('div');
                pDiv.className = 'link-card'; pDiv.innerText = app.name;
                pDiv.onclick = () => copyLink(app.p, app.special, 'process');
                pGrid.appendChild(pDiv);

                const tDiv = document.createElement('div');
                tDiv.className = 'link-card'; tDiv.innerText = app.name;
                tDiv.onclick = () => copyLink(app.t, app.special, 'trade');
                tGrid.appendChild(tDiv);
            });
        };
    </script>
</body>
</html>
